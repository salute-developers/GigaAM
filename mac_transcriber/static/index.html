<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GigaAM Studio</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <svg class="sprite" aria-hidden="true">
      <symbol id="icon-activity" viewBox="0 0 24 24">
        <path d="M3 12h4l3-8 4 16 3-8h4" />
      </symbol>
      <symbol id="icon-alert" viewBox="0 0 24 24">
        <path d="M12 9v4" />
        <path d="M12 17h.01" />
        <path d="M10.3 3.9 2.5 18a2 2 0 0 0 1.8 3h15.4a2 2 0 0 0 1.8-3L13.7 3.9a2 2 0 0 0-3.4 0Z" />
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="m5 12 4 4L19 6" />
      </symbol>
      <symbol id="icon-copy" viewBox="0 0 24 24">
        <rect x="9" y="9" width="11" height="11" rx="2" />
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
      </symbol>
      <symbol id="icon-download" viewBox="0 0 24 24">
        <path d="M12 3v12" />
        <path d="m7 10 5 5 5-5" />
        <path d="M5 21h14" />
      </symbol>
      <symbol id="icon-file" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z" />
        <path d="M14 2v6h6" />
      </symbol>
      <symbol id="icon-key" viewBox="0 0 24 24">
        <circle cx="7.5" cy="14.5" r="3.5" />
        <path d="M10 12 21 1" />
        <path d="m16 6 2 2" />
        <path d="m19 3 2 2" />
      </symbol>
      <symbol id="icon-list" viewBox="0 0 24 24">
        <path d="M8 6h13" />
        <path d="M8 12h13" />
        <path d="M8 18h13" />
        <path d="M3 6h.01" />
        <path d="M3 12h.01" />
        <path d="M3 18h.01" />
      </symbol>
      <symbol id="icon-loader" viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 1 1-6.2-8.6" />
      </symbol>
      <symbol id="icon-play" viewBox="0 0 24 24">
        <path d="m8 5 11 7-11 7Z" />
      </symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 0 1-15 6.7L3 16" />
        <path d="M3 21v-5h5" />
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8" />
        <path d="M21 3v5h-5" />
      </symbol>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.3-4.3" />
      </symbol>
      <symbol id="icon-upload" viewBox="0 0 24 24">
        <path d="M12 16V4" />
        <path d="m7 9 5-5 5 5" />
        <path d="M20 16.5V20a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-3.5" />
      </symbol>
    </svg>

    <div class="app-shell">
      <aside class="sidebar">
        <header class="brand">
          <div class="brand-mark">G</div>
          <div>
            <h1>GigaAM Studio</h1>
            <p>Локальная расшифровка</p>
          </div>
        </header>

        <section class="panel new-job">
          <div class="panel-title">
            <span>Новая задача</span>
            <svg><use href="#icon-upload" /></svg>
          </div>

          <form id="uploadForm" aria-label="Новая задача">
            <label id="dropZone" class="drop-zone" for="audioFile" title="Выбрать аудиофайл">
              <svg><use href="#icon-file" /></svg>
              <strong id="audioFileName">Выберите аудио</strong>
              <span>m4a, wav, mp3 или другой формат через ffmpeg</span>
              <input id="audioFile" name="file" type="file" accept="audio/*,.m4a,.mp3,.wav,.ogg,.flac" required />
            </label>

            <label class="field">
              <span>Треки участников</span>
              <input id="participantFiles" type="file" accept="audio/*,.m4a,.mp3,.wav,.ogg,.flac" multiple />
            </label>

            <label class="field">
              <span>Имена участников</span>
              <textarea id="participantNames" rows="3" placeholder="Илья&#10;Анна&#10;Дмитрий"></textarea>
            </label>

            <details id="authDetails" class="auth-box">
              <summary>
                <svg><use href="#icon-key" /></svg>
                API ключ
              </summary>
              <label class="sr-only" for="apiKeyInput">API ключ</label>
              <input id="apiKeyInput" type="password" autocomplete="off" placeholder="local-test" />
            </details>

            <button id="startButton" class="primary-button" type="submit" title="Запустить расшифровку">
              <svg><use href="#icon-play" /></svg>
              Запустить
            </button>
          </form>
        </section>

        <section class="history">
          <div class="history-head">
            <div class="panel-title">
              <span>История</span>
              <svg><use href="#icon-list" /></svg>
            </div>
            <button id="refreshButton" class="icon-button" type="button" title="Обновить">
              <svg><use href="#icon-refresh" /></svg>
            </button>
          </div>
          <div id="meetingList" class="meeting-list"></div>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="label">Сервис</p>
            <div class="status-line">
              <span id="healthDot" class="dot dot-muted"></span>
              <strong id="healthText">Проверяем</strong>
            </div>
          </div>
          <div class="topbar-meta">
            <span id="modelBadge">model</span>
            <span id="deviceBadge">device</span>
            <span id="batchBadge">batch</span>
          </div>
        </header>

        <section class="progress-band" aria-live="polite">
          <div id="progressRing" class="progress-ring" style="--progress: 0deg">
            <span id="progressValue">0%</span>
          </div>
          <div class="progress-copy">
            <p class="label">Текущая задача</p>
            <h2 id="jobTitle">Задача не выбрана</h2>
            <p id="jobMessage">Загрузите аудио или выберите задачу из истории.</p>
          </div>
          <div id="phaseSteps" class="phase-steps"></div>
        </section>

        <section class="toolbar">
          <label class="search" title="Поиск по транскрипту">
            <span class="sr-only">Поиск по транскрипту</span>
            <svg><use href="#icon-search" /></svg>
            <input id="searchInput" type="search" placeholder="Поиск по транскрипту" />
          </label>
          <div id="artifactActions" class="artifact-actions"></div>
        </section>

        <section id="detailPane" class="detail-pane">
          <div class="empty-state">
            <svg><use href="#icon-activity" /></svg>
            <h2>Готов к работе</h2>
            <p>После запуска здесь появится прогресс, сегменты речи и артефакты.</p>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/static/app.js" type="module"></script>
  </body>
</html>
